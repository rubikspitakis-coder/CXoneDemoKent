<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woollahra Municipal Council</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Open Sans', sans-serif; }
        .navy-bg { background-color: #1a2b4a; }
        .navy-text { color: #1a2b4a; }
        .search-btn { background-color: #1a2b4a; }
        .search-btn:hover { background-color: #0f1e35; }
        .nav-link { color: #1a2b4a; font-weight: 700; font-size: 15px; }
        .nav-link:hover { color: #00838F; }
        .nav-bar { border-top: 1px solid #ddd; border-bottom: 1px solid #ddd; }
        .icon-card {
            transition: all 0.2s;
            cursor: pointer;
        }
        .icon-card:hover {
            transform: translateY(-5px);
            color: #00838F;
        }
        .icon-card:hover .icon-circle {
            background-color: #00838F;
            color: white;
        }
        .icon-circle {
            background-color: #1a2b4a;
            color: white;
            transition: all 0.2s;
        }
        .search-input {
            border: 1px solid #b0b8c1;
            border-right: none;
        }
        .search-input:focus {
            outline: none;
            border-color: #1a2b4a;
        }
    </style>
</head>
<body class="bg-white text-slate-800">

    <!-- Top utility bar -->
    <div class="navy-bg text-white py-2 px-4 md:px-12 text-sm font-semibold flex justify-end gap-6">
        <a href="#" class="hover:underline">Contact Us</a>
        <a href="#" class="hover:underline">Forms</a>
        <a href="#" class="hover:underline">Public Notices</a>
        <a href="#" class="hover:underline">DA Notifications</a>
        <a href="#" class="hover:underline">Newsletters</a>
    </div>

    <!-- Header: Logo + Search -->
    <header class="py-6 px-4 md:px-12 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center">
            <img src="logo.png"
                 alt="Woollahra Municipal Council"
                 class="h-28 object-contain">
        </div>

        <div class="w-full max-w-xl flex">
            <input type="text" placeholder="Looking for something?"
                   class="search-input flex-1 px-4 py-3 text-base">
            <button class="search-btn text-white px-8 py-3 text-base font-bold uppercase tracking-wide">Search</button>
        </div>
    </header>

    <!-- Navigation bar -->
    <nav class="nav-bar py-4 px-4 md:px-12 mb-0">
        <div class="flex flex-wrap items-center gap-8">
            <a href="#" class="nav-link"><i class="fas fa-home text-xl"></i></a>
            <a href="#" class="nav-link">Council</a>
            <a href="#" class="nav-link">Services</a>
            <a href="#" class="nav-link">Building &amp; Development</a>
            <a href="#" class="nav-link">Library</a>
            <a href="#" class="nav-link">Community</a>
            <a href="#" class="nav-link">Environment</a>
            <a href="#" class="nav-link">Recreation</a>
            <a href="#" class="nav-link">News</a>
            <a href="#" class="nav-link">Events</a>
        </div>
    </nav>

    <!-- Hero image — aerial view of Woollahra/Sydney Harbour -->
    <div class="w-full overflow-hidden" style="height: 340px;">
        <img src="hero.jpg"
             alt="Aerial view of Woollahra"
             class="w-full h-full object-cover object-center">
    </div>

    <!-- Contact action bar -->
    <div class="bg-[#f4f7f9] border-b border-gray-200 py-5 px-4 md:px-12">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-center gap-4">
            <span class="text-[#1a2b4a] font-bold text-lg">Need to speak with us?</span>
            <button onclick="CXoneDemo.openCallbackModal()"
                class="flex items-center gap-2 bg-[#1a2b4a] text-white px-8 py-3 font-semibold text-sm hover:bg-[#0f1e35] transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                Request a Callback
            </button>
            <button onclick="CXoneDemo.openChat('I need help from Woollahra Council')"
                class="flex items-center gap-2 border-2 border-[#1a2b4a] text-[#1a2b4a] px-8 py-3 font-semibold text-sm hover:bg-[#1a2b4a] hover:text-white transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                Chat with Us
            </button>
        </div>
    </div>

    <!-- What would you like to do today? -->
    <div class="max-w-7xl mx-auto py-16 px-4 text-center">
        <h2 class="text-3xl font-bold text-[#1a2b4a] mb-16">What would you like to do today?</h2>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-8 justify-items-center">

            <div class="icon-card flex flex-col items-center gap-4" onclick="CXoneDemo.openChat('I need help with waste collection')">
                <div class="icon-circle w-20 h-20 flex items-center justify-center rounded-lg text-3xl">
                    <i class="fas fa-trash-alt"></i>
                </div>
                <span class="font-bold text-[#1a2b4a] text-base">Waste &amp;<br>recycling</span>
            </div>

            <div class="icon-card flex flex-col items-center gap-4" onclick="CXoneDemo.openChat('I want to report an issue')">
                <div class="icon-circle w-20 h-20 flex items-center justify-center rounded-lg text-3xl">
                    <i class="fas fa-comment-dots"></i>
                </div>
                <span class="font-bold text-[#1a2b4a] text-base">Report<br>an issue</span>
            </div>

            <div class="icon-card flex flex-col items-center gap-4" onclick="CXoneDemo.openChat('I need help with a development application')">
                <div class="icon-circle w-20 h-20 flex items-center justify-center rounded-lg text-3xl">
                    <i class="fas fa-file-alt"></i>
                </div>
                <span class="font-bold text-[#1a2b4a] text-base">Development<br>applications</span>
            </div>

            <div class="icon-card flex flex-col items-center gap-4" onclick="CXoneDemo.openChat('I want to pay my rates')">
                <div class="icon-circle w-20 h-20 flex items-center justify-center rounded-lg text-3xl">
                    <i class="fas fa-file-invoice"></i>
                </div>
                <span class="font-bold text-[#1a2b4a] text-base">Rates</span>
            </div>

            <div class="icon-card flex flex-col items-center gap-4" onclick="CXoneDemo.openChat('I need help with a job application')">
                <div class="icon-circle w-20 h-20 flex items-center justify-center rounded-lg text-3xl">
                    <i class="fas fa-briefcase"></i>
                </div>
                <span class="font-bold text-[#1a2b4a] text-base">Jobs</span>
            </div>

            <div class="icon-card flex flex-col items-center gap-4" onclick="CXoneDemo.openChat('I need help with library services')">
                <div class="icon-circle w-20 h-20 flex items-center justify-center rounded-lg text-3xl">
                    <i class="fas fa-book-open"></i>
                </div>
                <span class="font-bold text-[#1a2b4a] text-base">Library</span>
            </div>

        </div>
    </div>



    <script>
        window.DEMO_CONFIG = {
            name: 'Woollahra Council',
            pageName: 'Woollahra Homepage',
            cxone: {
                brandId: '1092',
                guideId: 'bb179a83-f2c6-4fb8-a020-1af5eb9d759f',
                loaderUrl: 'https://web-modules-de-na1.niceincontact.com/loader/1/loader.js'
            },
            branding: {
                primaryColor: '#1a2b4a',
                accentColor: '#00838F',
                lightBg: '#eef3f7',
                contentBg: '#FFFFFF',
                borderRadius: '4px',
                logoUrl: '/demos/woollahra/logo.png',
                logoSize: '180px'
            },
            callbackSuccessMessage: 'Your callback request has been submitted. A Woollahra Council representative will call you shortly.'
        };
    </script>
    <script src="/shared/cxone-widget.js"></script>
</body>
</html>
